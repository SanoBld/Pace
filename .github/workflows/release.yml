name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version pour la Release (ex: 1.0.1)'
        required: true
        type: string

jobs:
  # ── Android APK ───────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${VERSION} \
            --build-number=${{ github.run_number }}
        env:
          VERSION: ${{ inputs.version || 'dev' }}

      - name: Rename APK
        run: |
          VERSION=${{ inputs.version || 'dev' }}
          mv build/app/outputs/flutter-apk/app-release.apk \
             pace-${VERSION}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: pace-*-android.apk
          retention-days: 30

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: |
          $VERSION = if ("${{ inputs.version }}" -ne "") { "${{ inputs.version }}" } else { "dev" }
          flutter build windows --release `
            --build-name=$VERSION `
            --build-number=${{ github.run_number }}

      - name: Zip Windows build
        run: |
          $VERSION = if ("${{ inputs.version }}" -ne "") { "${{ inputs.version }}" } else { "dev" }
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath pace-$VERSION-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: pace-*-windows.zip
          retention-days: 30

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux
        run: |
          VERSION=${{ inputs.version || 'dev' }}
          flutter build linux --release \
            --build-name=${VERSION} \
            --build-number=${{ github.run_number }}

      - name: Tar Linux build
        run: |
          VERSION=${{ inputs.version || 'dev' }}
          tar -czf pace-${VERSION}-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: pace-*-linux.tar.gz
          retention-days: 30

  # ── GitHub Release (manuel seulement) ────────────────────────────────────
  release:
    name: Create Release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Pace v${{ inputs.version }}
          body: |
            ## Pace v${{ inputs.version }}

            | Plateforme | Fichier |
            |---|---|
            | 🤖 Android | `pace-${{ inputs.version }}-android.apk` |
            | 🪟 Windows | `pace-${{ inputs.version }}-windows.zip` |
            | 🐧 Linux   | `pace-${{ inputs.version }}-linux.tar.gz` |
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
